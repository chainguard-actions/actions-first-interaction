name: Test pr_message input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          pr_message: "Thanks for opening your first pull request!"
          repo_token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran with pr_message input
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "failure" ]; then
            echo "FAIL: action failed unexpectedly"
            exit 1
          fi
          echo "PASS: action completed with pr_message input"
