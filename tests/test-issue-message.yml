name: Test issue_message input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: issues
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          issue_message: "Welcome! Thanks for opening your first issue."
          repo_token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran with issue_message input
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "failure" ]; then
            echo "FAIL: action failed unexpectedly"
            exit 1
          fi
          echo "PASS: action completed with issue_message input"
