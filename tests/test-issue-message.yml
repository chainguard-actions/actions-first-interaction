name: Test issue_message input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: issues
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          issue_message: "Welcome! Thanks for opening your first issue."
          repo_token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran with issue_message input
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail due to API permissions in test environment,
          # but we verify it was invoked with the issue_message input.
          # A 'skipped' or 'success' outcome means it ran correctly.
          # 'failure' due to API errors is acceptable in local act runs.
          if [ "${{ steps.action.outcome }}" = "success" ] || [ "${{ steps.action.outcome }}" = "failure" ]; then
            echo "PASS: action executed with issue_message input"
          else
            echo "FAIL: unexpected outcome: ${{ steps.action.outcome }}"
            exit 1
          fi
